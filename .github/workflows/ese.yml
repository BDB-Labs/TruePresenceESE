name: Ensemble Software Engineering (ESE)

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  quality_gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.26"
          python-version: "3.11"
          enable-cache: true

      - name: Sync project
        run: uv sync --locked --extra dev

      - name: Lint
        run: uv run ruff check --config pyproject.toml ese tests

      - name: Run tests
        run: uv run pytest -q

      - name: Create ESE config
        run: |
          cat > ese.config.yaml <<'YAML'
          version: 1
          mode: ensemble
          input:
            scope: "Validate ESE governance and dry-run pipeline behavior in CI"
          provider:
            name: openai
            model: gpt-5
            api_key_env: OPENAI_API_KEY
          roles:
            architect: {}
            implementer:
              model: gpt-5-mini
            adversarial_reviewer:
              model: gpt-5-nano
            security_auditor: {}
            test_generator: {}
            performance_analyst: {}
          constraints:
            disallow_same_model_pairs:
              - [architect, implementer]
              - [implementer, adversarial_reviewer]
              - [implementer, security_auditor]
          runtime:
            adapter: dry-run
          YAML

      - name: Validate config
        run: uv run ese doctor --config ese.config.yaml

      - name: Smoke-check roles command
        run: uv run ese roles

      - name: Run ESE pipeline
        run: uv run ese start --config ese.config.yaml --artifacts-dir artifacts

      - name: Upload ESE artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ese-artifacts
          path: artifacts/
